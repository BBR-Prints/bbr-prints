backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "assets/uploads"

collections:
  - name: "catalog"
    label: "Shop Catalog"
    files:
      - name: "products"
        label: "Products"
        file: "products.json"
        fields:
          - label: "Products"
            name: "products"
            widget: "list"
            summary: "{{fields.name}} - ${{fields.price}}"
            fields:
              - label: "ID"
                name: "id"
                widget: "string"
                hint: "Use lowercase letters, numbers, and dashes, like dragon-dice-tower."
              - label: "Name"
                name: "name"
                widget: "string"
              - label: "Price"
                name: "price"
                widget: "number"
                value_type: "float"
                min: 0
              - label: "Category"
                name: "category"
                widget: "select"
                options: ["Home", "Gaming", "Desk", "Cosplay", "Other"]
              - label: "Material"
                name: "material"
                widget: "string"
                required: false
              - label: "Color options"
                name: "colors"
                widget: "string"
                required: false
              - label: "Print time"
                name: "time"
                widget: "string"
                required: false
              - label: "Description"
                name: "description"
                widget: "text"
                required: false
              - label: "Product photo"
                name: "image"
                widget: "image"
                hint: "Main fallback photo. Use Product media below for multiple photos or videos."
              - label: "Product media"
                name: "media"
                widget: "list"
                required: false
                summary: "{{fields.type}} - {{fields.alt}}"
                fields:
                  - label: "Media type"
                    name: "type"
                    widget: "select"
                    options: ["image", "video"]
                    default: "image"
                  - label: "Image"
                    name: "image"
                    widget: "image"
                    required: false
                  - label: "Video"
                    name: "video"
                    widget: "file"
                    required: false
                    media_library:
                      config:
                        multiple: false
                  - label: "Alt text"
                    name: "alt"
                    widget: "string"
                    required: false
              - label: "Stripe payment link"
                name: "paymentLink"
                widget: "string"
                required: false
      - name: "reviews"
        label: "Approved Reviews"
        file: "reviews.json"
        fields:
          - label: "Reviews"
            name: "reviews"
            widget: "list"
            summary: "{{fields.name}} - {{fields.rating}} stars"
            fields:
              - label: "Customer name"
                name: "name"
                widget: "string"
              - label: "Rating"
                name: "rating"
                widget: "number"
                min: 1
                max: 5
                value_type: "int"
                default: 5
              - label: "Review"
                name: "message"
                widget: "text"
